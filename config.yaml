model:
  name: "resnet50"           # "resnet50" or "resnet152"
  pretrained: true
  image_width: 224
  image_height: 224
  channels: 3
  model_save_path: "models/mask_detector.h5"

training:
  batch_size: 32
  epochs: 10                 # Phase 1: head-only training (frozen base)
  finetune_epochs: 10        # Phase 2: fine-tuning unfrozen top layers
  learning_rate: 0.001       # Phase 1 LR (higher — head starts from scratch)
  finetune_lr: 0.00001       # Phase 2 LR (MUST be very small to avoid forgetting)
  unfreeze_layers: 20        # How many top base layers to unfreeze in Phase 2
  device: "auto"              # "auto", "cpu", or "gpu"
  use_class_weights: true    # Handles imbalanced datasets automatically
  class_counts:
    with_mask: 3725
    without_mask: 3828

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_dir: "data/processed/train"
  val_dir: "data/processed/val"
  test_dir: "data/processed/test"
  image_size: 224
  categories: ["with_mask", "without_mask"]

mlflow:
  experiment_name: "face_mask_detection"
